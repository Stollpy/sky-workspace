<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxia PCB — Schéma Électrique (2 PCBs)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --border: #1e293b;
    --accent: #3b82f6;
    --accent2: #f59e0b;
    --red: #ef4444;
    --green: #22c55e;
    --purple: #a855f7;
    --pink: #ec4899;
    --text: #e2e8f0;
    --dim: #64748b;
    --wire: #60a5fa;
    --power5v: #f97316;
    --power3v3: #22c55e;
    --vbat: #eab308;
    --gnd: #475569;
    --sat-bg: #1a1520;
    --main-bg: #0d1a25;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
    gap: 16px;
  }
  #header h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
  #header .subtitle { font-size: 12px; color: var(--dim); font-family: 'JetBrains Mono', monospace; }

  .legend { display: flex; gap: 16px; margin-left: auto; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  #canvas-container { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
  #canvas-container:active { cursor: grabbing; }
  svg { position: absolute; top: 0; left: 0; }

  .component { cursor: pointer; transition: filter 0.2s; }
  .component:hover { filter: brightness(1.3); }
  .component-body { stroke-width: 2; rx: 4; ry: 4; }
  .pin-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--dim); }
  .comp-label { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; fill: var(--text); }
  .comp-ref { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--accent); }
  .comp-value { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--dim); }
  .wire { stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .wire-5v { stroke: var(--power5v); }
  .wire-3v3 { stroke: var(--power3v3); }
  .wire-vbat { stroke: var(--vbat); }
  .wire-gnd { stroke: var(--gnd); stroke-dasharray: 6,3; }
  .wire-signal { stroke: var(--wire); }
  .wire-usb { stroke: var(--purple); }
  .junction { stroke: none; }
  .net-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; }
  .power-flag { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; }
  .section-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; }

  #tooltip {
    position: fixed; background: var(--surface); border: 1px solid var(--accent);
    border-radius: 6px; padding: 10px 14px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace; pointer-events: none;
    opacity: 0; transition: opacity 0.2s; z-index: 200; max-width: 300px;
    line-height: 1.6; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip.visible { opacity: 1; }

  #controls {
    position: fixed; bottom: 16px; right: 16px; display: flex; gap: 8px; z-index: 100;
  }
  #controls button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  #controls button:hover { background: var(--accent); }
</style>
</head>
<body>

<div id="header">
  <h1>LUXIA PCB</h1>
  <span class="subtitle">2 PCBs : Principal + Satellite Batterie</span>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--power5v)"></span> 5V</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--power3v3)"></span> 3.3V</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--vbat)"></span> VBAT</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--wire)"></span> Signal</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--gnd)"></span> GND</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span> USB</span>
  </div>
</div>

<div id="canvas-container">
<svg id="schematic" width="1900" height="1200" viewBox="0 0 1900 1200">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="var(--dim)"/>
    </marker>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2332" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1900" height="1200" fill="url(#grid)"/>

  <!-- Title block -->
  <rect x="1520" y="1120" width="360" height="60" fill="var(--surface)" stroke="var(--border)" rx="4"/>
  <text x="1540" y="1142" class="comp-label" font-size="14" fill="var(--accent)">LUXIA — Schéma Électrique Rev B</text>
  <text x="1540" y="1158" class="comp-value">2 PCBs | ESP32-C6 | 28BYJ-48 | LiPo Satellite</text>
  <text x="1540" y="1170" class="comp-value">stollpy-labs | 2026-03</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!--              PCB SATELLITE (Batterie)                              -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Satellite outline -->
  <rect x="40" y="50" width="500" height="490" rx="12" fill="var(--sat-bg)" stroke="var(--pink)" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="60" y="80" class="section-title" fill="var(--pink)">PCB SATELLITE (Batterie)</text>
  <text x="60" y="98" class="comp-value" fill="var(--pink)">Se débranche du principal — recharge indépendante via USB-C</text>

  <!-- USB-C (J_USB) — charge only -->
  <g class="component" data-tip="USB-C (J_USB)&#10;Charge uniquement — PAS de data&#10;VBUS: 5V vers TP4056&#10;CC1/CC2: 5.1kΩ → GND&#10;D-/D+: non connectés (NC)">
    <rect x="60" y="140" width="120" height="160" class="component-body" fill="#1a1040" stroke="var(--purple)"/>
    <text x="120" y="170" text-anchor="middle" class="comp-label">USB-C</text>
    <text x="120" y="185" text-anchor="middle" class="comp-ref">J_USB</text>
    <text x="120" y="200" text-anchor="middle" class="comp-value">Charge only</text>
    <text x="185" y="225" class="pin-label" text-anchor="end">VBUS</text>
    <line x1="180" y1="222" x2="210" y2="222" stroke="var(--red)" stroke-width="2"/>
    <text x="185" y="245" class="pin-label" text-anchor="end">GND</text>
    <line x1="180" y1="242" x2="210" y2="242" stroke="var(--gnd)" stroke-width="2"/>
    <text x="185" y="265" class="pin-label" text-anchor="end" fill="var(--dim)">D-/D+</text>
    <text x="185" y="280" class="pin-label" text-anchor="end" fill="var(--dim)">NC</text>
    <text x="120" y="300" text-anchor="middle" class="comp-value">CC: 5.1kΩ→GND</text>
  </g>

  <!-- TP4056-42-ESOP8 (U3) -->
  <g class="component" data-tip="TP4056-42-ESOP8 (U3)&#10;Chargeur LiPo CC/CV&#10;VCC: 5V USB&#10;BAT: vers cellule LiPo (4.2V)&#10;PROG: R3=2kΩ → 500mA charge&#10;CHRG: LED rouge (en charge)&#10;STDBY: LED verte (complet)&#10;Boîtier ESOP-8">
    <rect x="260" y="140" width="150" height="190" class="component-body" fill="#1a2010" stroke="var(--vbat)"/>
    <text x="335" y="168" text-anchor="middle" class="comp-label">TP4056</text>
    <text x="335" y="183" text-anchor="middle" class="comp-ref">U3 — ESOP8</text>
    <text x="335" y="198" text-anchor="middle" class="comp-value">Chargeur LiPo</text>
    <!-- Left pins -->
    <text x="270" y="225" class="pin-label">VCC</text>
    <line x1="240" y1="222" x2="260" y2="222" stroke="var(--red)" stroke-width="2"/>
    <text x="270" y="245" class="pin-label">CE</text>
    <text x="270" y="265" class="pin-label">TEMP</text>
    <text x="270" y="285" class="pin-label">GND</text>
    <line x1="240" y1="282" x2="260" y2="282" stroke="var(--gnd)" stroke-width="2"/>
    <!-- Right pins -->
    <text x="400" y="225" class="pin-label" text-anchor="end">BAT</text>
    <line x1="410" y1="222" x2="440" y2="222" stroke="var(--vbat)" stroke-width="2.5"/>
    <text x="400" y="245" class="pin-label" text-anchor="end">PROG</text>
    <text x="400" y="265" class="pin-label" text-anchor="end">CHRG</text>
    <text x="400" y="285" class="pin-label" text-anchor="end">STDBY</text>
    <!-- PROG resistor -->
    <rect x="415" y="238" width="35" height="12" fill="none" stroke="var(--dim)" stroke-width="1.5" rx="2"/>
    <text x="432" y="247" text-anchor="middle" class="comp-value" font-size="7">R3 2kΩ</text>
    <text x="432" y="260" text-anchor="middle" class="comp-value" font-size="7">→GND</text>
    <!-- LEDs -->
    <circle cx="420" cy="265" r="4" fill="var(--red)" opacity="0.8"/>
    <text x="428" y="268" class="comp-value" font-size="7">D2 CHG</text>
    <circle cx="420" cy="285" r="4" fill="var(--green)" opacity="0.8"/>
    <text x="428" y="288" class="comp-value" font-size="7">D3 STBY</text>
  </g>

  <!-- Wire: USB VBUS → TP4056 VCC -->
  <polyline points="210,222 240,222" class="wire" stroke="var(--red)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="222" y="216" class="net-label" fill="var(--red)" font-size="9">5V USB</text>

  <!-- Protection DW01A + FS8205A -->
  <g class="component" data-tip="DW01A (U6) + FS8205A (Q1)&#10;Protection batterie LiPo&#10;&#10;Sur-décharge: coupure ~2.5V&#10;Sur-charge: coupure ~4.3V&#10;Court-circuit: coupure immédiate&#10;&#10;Entre TP4056.BAT et cellule LiPo">
    <rect x="260" y="370" width="150" height="80" class="component-body" fill="#2a1520" stroke="var(--pink)"/>
    <text x="335" y="395" text-anchor="middle" class="comp-label" font-size="11">PROTECTION</text>
    <text x="335" y="410" text-anchor="middle" class="comp-ref">DW01A + FS8205A</text>
    <text x="335" y="428" text-anchor="middle" class="comp-value">OVP / UVP / SCP</text>
    <line x1="335" y1="330" x2="335" y2="370" stroke="var(--vbat)" stroke-width="2"/>
    <text x="345" y="355" class="net-label" fill="var(--vbat)" font-size="9">BAT_PROT</text>
  </g>

  <!-- Batterie LiPo (J_BAT) -->
  <g class="component" data-tip="Cellule LiPo 1S (J_BAT)&#10;3.7V nominal / 4.2V pleine charge&#10;Connecteur JST-PH 2P&#10;Capacité recommandée: 1000-3000mAh">
    <rect x="80" y="370" width="120" height="80" class="component-body" fill="#1a2010" stroke="var(--vbat)" stroke-width="2"/>
    <!-- Battery graphic -->
    <rect x="110" y="388" width="50" height="30" fill="none" stroke="var(--vbat)" stroke-width="2" rx="3"/>
    <rect x="160" y="396" width="6" height="14" fill="var(--vbat)" rx="1"/>
    <text x="135" y="408" text-anchor="middle" class="comp-value" fill="var(--vbat)" font-size="10">LiPo</text>
    <text x="140" y="465" text-anchor="middle" class="comp-ref">J_BAT · JST-PH</text>
    <text x="140" y="478" text-anchor="middle" class="comp-value">3.7V / 1S</text>
  </g>

  <!-- Wire: TP4056 BAT → Protection -->
  <polyline points="440,222 470,222 470,350 335,350 335,370" class="wire wire-vbat" stroke-width="2"/>
  <circle cx="470" cy="222" r="4" class="junction" fill="var(--vbat)"/>

  <!-- Wire: Protection → Battery -->
  <polyline points="260,410 200,410" class="wire wire-vbat" stroke-width="2"/>

  <!-- Wire: BAT_PROT → output bus -->
  <circle cx="470" cy="350" r="4" class="junction" fill="var(--vbat)"/>
  <line x1="470" y1="350" x2="470" y2="480" stroke="var(--vbat)" stroke-width="3" opacity="0.6"/>

  <!-- Magnetic connector satellite side (J_MAG) -->
  <g class="component" data-tip="Connecteur Magnétique (J_MAG)&#10;Côté SATELLITE (mâle)&#10;Pin 1: VBAT+ (3.0V–4.2V)&#10;Pin 2: GND&#10;Pogo pins magnétiques&#10;Courant max ≥1A/pin">
    <rect x="430" y="480" width="100" height="55" class="component-body" fill="#2a1a10" stroke="var(--accent2)" stroke-width="2.5"/>
    <path d="M445,485 Q460,478 475,485 Q490,492 505,485" fill="none" stroke="var(--accent2)" stroke-width="2"/>
    <text x="480" y="505" text-anchor="middle" class="comp-label" font-size="11">MAGNETIC</text>
    <text x="480" y="518" text-anchor="middle" class="comp-ref">J_MAG (mâle)</text>
    <text x="480" y="530" text-anchor="middle" class="comp-value">VBAT+ / GND</text>
  </g>

  <!-- Wire: VBAT bus → Mag connector -->
  <line x1="470" y1="480" x2="470" y2="490" stroke="var(--vbat)" stroke-width="2.5"/>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!--      Magnetic link (dashed, between the two PCBs)                  -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <line x1="480" y1="540" x2="480" y2="620" stroke="var(--accent2)" stroke-width="3" stroke-dasharray="10,6" opacity="0.7"/>
  <text x="500" y="575" class="net-label" fill="var(--accent2)" font-size="12">VBAT</text>
  <text x="500" y="592" class="comp-value" fill="var(--accent2)">magnétique</text>
  <text x="500" y="605" class="comp-value" fill="var(--accent2)">débranchable</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!--              PCB PRINCIPAL (Luxia Main)                            -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Principal outline -->
  <rect x="40" y="620" width="1480" height="490" rx="12" fill="var(--main-bg)" stroke="var(--accent)" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
  <text x="60" y="652" class="section-title" fill="var(--accent)">PCB PRINCIPAL (Luxia Main)</text>
  <text x="60" y="670" class="comp-value" fill="var(--accent)">ESP32-C6 + ULN2003A + 28BYJ-48 — alimenté par le satellite</text>

  <!-- Magnetic connector main side (J1) -->
  <g class="component" data-tip="Connecteur Magnétique (J1)&#10;Côté PRINCIPAL (femelle)&#10;Pin 1: VBAT+ (entrée 3.0V–4.2V)&#10;Pin 2: GND&#10;Pogo pins magnétiques&#10;Seule source d'alimentation du PCB">
    <rect x="430" y="620" width="100" height="55" class="component-body" fill="#2a1a10" stroke="var(--accent2)" stroke-width="2.5"/>
    <path d="M445,630 Q460,623 475,630 Q490,637 505,630" fill="none" stroke="var(--accent2)" stroke-width="2"/>
    <text x="480" y="650" text-anchor="middle" class="comp-label" font-size="11">MAGNETIC</text>
    <text x="480" y="663" text-anchor="middle" class="comp-ref">J1 (femelle)</text>
    <text x="480" y="675" text-anchor="middle" class="comp-value">→ VBAT bus</text>
  </g>

  <!-- VBAT bus on principal -->
  <line x1="480" y1="675" x2="480" y2="920" stroke="var(--vbat)" stroke-width="3" opacity="0.5"/>
  <circle cx="480" cy="700" r="4" class="junction" fill="var(--vbat)"/>
  <circle cx="480" cy="780" r="4" class="junction" fill="var(--vbat)"/>
  <circle cx="480" cy="860" r="4" class="junction" fill="var(--vbat)"/>
  <text x="490" y="695" class="net-label" fill="var(--vbat)">VBAT BUS</text>

  <!-- C4 VBAT input cap -->
  <g class="component" data-tip="C4: 10µF&#10;Condensateur d'entrée VBAT&#10;Filtrage bus batterie">
    <line x1="480" y1="700" x2="510" y2="700" stroke="var(--vbat)" stroke-width="1.5"/>
    <line x1="510" y1="690" x2="510" y2="710" stroke="var(--accent)" stroke-width="2"/>
    <line x1="516" y1="693" x2="516" y2="707" stroke="var(--accent)" stroke-width="2"/>
    <line x1="516" y1="700" x2="540" y2="700" stroke="var(--gnd)" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="525" y="688" class="comp-value">C4</text>
    <text x="525" y="718" class="comp-value">10µF</text>
  </g>

  <!-- ═══════════════════ MT3608 Boost ═══════════════════ -->
  <g class="component" data-tip="MT3608 (U4)&#10;Boost converter&#10;VIN: VBAT (~3.7V)&#10;VOUT: 5.0V&#10;L1: 22µH inductance&#10;D1: SS34 Schottky&#10;FB: 100k/33k → 5V">
    <rect x="80" y="730" width="160" height="150" class="component-body" fill="#1a1000" stroke="var(--power5v)"/>
    <text x="160" y="758" text-anchor="middle" class="comp-label">MT3608</text>
    <text x="160" y="773" text-anchor="middle" class="comp-ref">U4</text>
    <text x="160" y="788" text-anchor="middle" class="comp-value">Boost VBAT→5V</text>
    <text x="95" y="815" class="pin-label">VIN</text>
    <line x1="60" y1="812" x2="80" y2="812" stroke="var(--vbat)" stroke-width="2"/>
    <text x="95" y="835" class="pin-label">GND</text>
    <text x="230" y="815" class="pin-label" text-anchor="end">SW</text>
    <line x1="240" y1="812" x2="270" y2="812" stroke="var(--power5v)" stroke-width="2"/>
    <text x="230" y="835" class="pin-label" text-anchor="end">FB</text>
    <!-- L1 -->
    <path d="M270,812 Q280,802 290,812 Q300,822 310,812 Q320,802 330,812 Q340,822 350,812" fill="none" stroke="var(--power5v)" stroke-width="2"/>
    <text x="310" y="800" text-anchor="middle" class="comp-ref">L1 22µH</text>
    <!-- D1 -->
    <polygon points="360,812 375,802 375,822" fill="none" stroke="var(--power5v)" stroke-width="1.5"/>
    <line x1="375" y1="802" x2="375" y2="822" stroke="var(--power5v)" stroke-width="2"/>
    <line x1="375" y1="812" x2="410" y2="812" stroke="var(--power5v)" stroke-width="2"/>
    <text x="368" y="798" class="comp-ref">D1 SS34</text>
    <!-- FB divider -->
    <text x="250" y="845" class="comp-value">R_fb 100k/33k</text>
  </g>

  <!-- Wire: VBAT → MT3608 VIN -->
  <polyline points="480,780 60,780 60,812" class="wire wire-vbat"/>

  <!-- 5V net -->
  <text x="415" y="808" class="power-flag" fill="var(--power5v)">+5V</text>
  <line x1="410" y1="812" x2="410" y2="920" stroke="var(--power5v)" stroke-width="2.5" opacity="0.5"/>
  <circle cx="410" cy="812" r="4" class="junction" fill="var(--power5v)"/>
  <circle cx="410" cy="870" r="4" class="junction" fill="var(--power5v)"/>

  <!-- C5 5V cap -->
  <g class="component" data-tip="C5: 22µF&#10;Condensateur sortie 5V">
    <line x1="410" y1="812" x2="410" y2="835" stroke="var(--power5v)" stroke-width="1.5"/>
    <line x1="400" y1="835" x2="420" y2="835" stroke="var(--accent)" stroke-width="2"/>
    <line x1="403" y1="841" x2="417" y2="841" stroke="var(--accent)" stroke-width="2"/>
    <text x="425" y="840" class="comp-value">C5 22µF</text>
  </g>

  <!-- ═══════════════════ AMS1117 LDO ═══════════════════ -->
  <g class="component" data-tip="AMS1117-3.3 (U5)&#10;LDO Régulateur linéaire&#10;VIN: VBAT (~3.7V)&#10;VOUT: 3.3V&#10;Dropout: 1.1V @ 1A&#10;C2: 10µF input / C3: 22µF output">
    <rect x="80" y="930" width="160" height="100" class="component-body" fill="#0a1a0a" stroke="var(--power3v3)"/>
    <text x="160" y="958" text-anchor="middle" class="comp-label">AMS1117</text>
    <text x="160" y="973" text-anchor="middle" class="comp-ref">U5</text>
    <text x="160" y="988" text-anchor="middle" class="comp-value">LDO 3.3V</text>
    <text x="95" y="1010" class="pin-label">VIN</text>
    <line x1="60" y1="1007" x2="80" y2="1007" stroke="var(--vbat)" stroke-width="2"/>
    <text x="230" y="1010" class="pin-label" text-anchor="end">VOUT</text>
    <line x1="240" y1="1007" x2="300" y2="1007" stroke="var(--power3v3)" stroke-width="2.5"/>
    <!-- Caps -->
    <text x="60" y="1028" class="comp-value">C2 10µF in</text>
    <text x="250" y="1028" class="comp-value">C3 22µF out</text>
  </g>

  <!-- Wire: VBAT → LDO VIN -->
  <polyline points="480,860 60,860 60,1007" class="wire wire-vbat"/>

  const cx = rect.width / 2, cy = rect.height / 2;
  const oldScale = scale;
  scale = Math.max(0.3, Math.min(4, scale * factor));
  const ratio = scale / oldScale;
  panX = cx - ratio * (cx - panX);
  panY = cy - ratio * (cy - panY);
  updateTransform();
}

function resetView() { scale = 0.85; panX = 20; panY = -10; updateTransform(); }

container.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; });
container.addEventListener('mousemove', (e) => { if (isDragging) { panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); } });
container.addEventListener('mouseup', () => isDragging = false);
container.addEventListener('mouseleave', () => isDragging = false);

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldScale = scale;
  scale = Math.max(0.3, Math.min(4, scale * factor));
  const ratio = scale / oldScale;
  panX = mx - ratio * (mx - panX);
  panY = my - ratio * (my - panY);
  updateTransform();
}, { passive: false });

document.querySelectorAll('.component').forEach(el => {
  el.addEventListener('mouseenter', (e) => {
    const tip = el.dataset.tip;
    if (!tip) return;
    tooltip.innerHTML = tip.replace(/\n/g, '<br>');
    tooltip.classList.add('visible');
  });
  el.addEventListener('mousemove', (e) => {
    tooltip.style.left = Math.min(e.clientX + 15, window.innerWidth - 320) + 'px';
    tooltip.style.top = Math.min(e.clientY + 15, window.innerHeight - 200) + 'px';
  });
  el.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
});

resetView();
</script>
</body>
</html>
